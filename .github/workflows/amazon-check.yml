name: Amazon Listing Check

on:
  # 1:00am Mauritius time = 9:00pm UTC the night before
  schedule:
    - cron: '0 21 * * *'

  # Manual trigger — from GitHub OR from the Google Sheet button
  workflow_dispatch:
    inputs:
      marketplace:
        description: 'Marketplace to check (leave blank for ALL tabs)'
        required: false
        default: ''

jobs:
  check-listings:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules and Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Run Amazon listing check
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          MARKETPLACE: ${{ github.event.inputs.marketplace }}
        run: node amazon-check.js
