name: Amazon Listing Check

on:
  # Run automatically every day at 01:00 UTC = 05:00 Mauritius time (UTC+4)
  schedule:
    - cron: '0 1 * * *'

  # Also lets you click "Run workflow" manually in the GitHub Actions tab
  workflow_dispatch:

jobs:
  check-listings:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3-hour safety cut-off

    steps:
      # 1. Download the repo files
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js 20
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Cache the node_modules AND Puppeteer's Chrome download
      #    so subsequent runs start much faster
      - name: Cache node_modules and Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      # 4. Install npm packages (downloads Chromium on first run)
      - name: Install dependencies
        run: npm install

      # 5. Install system libraries that headless Chrome needs on Ubuntu
      - name: Install Chrome system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libatspi2.0-0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      # 6. Run the checker — secrets are injected as environment variables
      - name: Run Amazon listing check
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: node amazon-check.js
