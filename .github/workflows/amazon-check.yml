name: Amazon Listing Check
on:
  workflow_dispatch:
    inputs:
      marketplace:
        description: 'Marketplace to check (leave blank for ALL tabs)'
        required: false
        default: ''
      mode:
        description: 'Run mode: full or spotcheck'
        required: false
        default: 'full'
      identifiers:
        description: 'ASINs or SKUs to check (comma separated, spotcheck mode only)'
        required: false
        default: ''
      markets:
        description: 'Marketplaces for spot check (comma separated or ALL)'
        required: false
        default: 'ALL'
      chat_id:
        description: 'Telegram chat ID to send spot check results back to'
        required: false
        default: '435507536'
      source:
        description: 'What triggered this run: telegram, sheet, github, automatic'
        required: false
        default: 'github'
jobs:
  check-listings:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules and Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/puppeteer
          key: deps-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Run Amazon listing check
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MARKETPLACE: ${{ github.event.inputs.marketplace }}
          RUN_MODE: ${{ github.event.inputs.mode }}
          IDENTIFIERS: ${{ github.event.inputs.identifiers }}
          MARKETS: ${{ github.event.inputs.markets }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.chat_id }}
          RUN_SOURCE: ${{ github.event.inputs.source }}
        run: node amazon-check.js

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/debug-*.png
          if-no-files-found: ignore
